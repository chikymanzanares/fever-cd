# E2E on full Compose stack, then push image to Docker Hub and optionally trigger Render.
# Required repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Optional: RENDER_DEPLOY_HOOK_URL (from Render → Service → Settings → Deploy Hook)

name: CD — Docker image + Render

on:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env for Compose
        run: cp .env.example .env

      - name: Run E2E (full stack)
        run: make test-e2e

      - name: Tear down Compose
        if: always()
        run: docker compose down -v || true

  build-push-deploy:
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          target: production
          tags: |
            chikymanzanares/fever:latest
            chikymanzanares/fever:${{ github.sha }}

      - name: Trigger Render deploy (optional)
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set; skipping Render deploy."
            exit 0
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
